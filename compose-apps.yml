# --- CUSTOM SERVICES & BOTS ---
services:
  # --- VAULTWARDEN (Self-hosted Bitwarden) ---
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - DOMAIN=${VAULTWARDEN_DOMAIN}
    volumes:
      - ${APP_CONFIG_PATH}/vaultwarden:/data
    ports:
      - "8082:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - media-network

  # --- Telegram Bot for Academy Offers ---
  pol-academy-offers-bot:
    build: https://github.com/PlatanosVerdes/PolFerrerAcademyOffers.git#main
    container_name: pol-academy-offers-bot
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    network_mode: host
    environment: 
      BOT_TOKEN: ${BOT_POL_ACADEMY_OFFERS_TOKEN}
    volumes:
      - ${APP_CONFIG_PATH}/pol-academy-bot:/app/data

networks:
  media-network:
    external: true