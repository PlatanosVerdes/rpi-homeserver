# --- CUSTOM SERVICES & BOTS ---
services:
  # --- Google Calendar Bridge (ESP32 / local API) ---
  cal-bridge:
    build: https://github.com/PlatanosVerdes/cal-bridge.git#main
    container_name: cal-bridge
    restart: unless-stopped
    profiles: [cal, all]
    networks:
      - media-network
    ports:
      - "8091:8000"
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CAL_API_KEY: ${CAL_API_KEY}
      CAL_BASE_URL: ${CAL_BASE_URL:-https://cal.platanosverdes.com}
    volumes:
      - ${APP_CONFIG_PATH}/cal-bridge:/data/tokens

  # --- Telegram Bot for Academy Offers ---
  pol-academy-offers-bot:
    build: https://github.com/PlatanosVerdes/PolFerrerAcademyOffers.git#main
    container_name: pol-academy-offers-bot
    restart: unless-stopped
    profiles: [bot, all]
    dns:
      - 8.8.8.8
      - 1.1.1.1
    network_mode: host
    environment: 
      BOT_TOKEN: ${BOT_POL_ACADEMY_OFFERS_TOKEN}
    volumes:
      - ${APP_CONFIG_PATH}/pol-academy-bot:/app/data


networks:
  media-network:
    external: true