# --- MONITORING ---
services:
  # --- PUSHGATEWAY (Metrics receiver) ---
  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - media-network


  # --- NODE EXPORTER (Host metrics: CPU, RAM, disk, network) ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  # --- CADVISOR (Container metrics) ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - media-network

  # --- PROMETHEUS (TSDB database) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: "root"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${CONFIG_ROOT}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${APP_CONFIG_PATH}/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - media-network


  # --- GRAFANA (Dashboard visual) ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    user: "root"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ${APP_CONFIG_PATH}/grafana/data:/var/lib/grafana
      - ${CONFIG_ROOT}/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${CONFIG_ROOT}/grafana/dashboards_json:/etc/grafana/dashboards_json:ro
    networks:
      - media-network

  # --- PIHOLE EXPORTER (Pi-hole DNS/ad-block metrics → Prometheus) ---
  # Pi-hole is installed natively on the host (not in Docker) via Tailscale.
  # This exporter scrapes Pi-hole's API and exposes /metrics for Prometheus.
  # Grafana dashboard: https://grafana.com/grafana/dashboards/10176
  #
  # pihole-exporter:
  #   image: ekofr/pihole-exporter:latest
  #   container_name: pihole-exporter
  #   restart: unless-stopped
  #   environment:
  #     - PIHOLE_HOSTNAME=localhost        # or Pi-hole IP/Tailscale IP
  #     - PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
  #     - PIHOLE_PORT=80
  #     - INTERVAL=30s
  #     - PORT=9617
  #   networks:
  #     - media-network

  # --- TAILSCALE EXPORTER (Tailscale device status → Prometheus) ---
  # Queries the Tailscale API to expose device online/offline status as metrics.
  # Requires a Tailscale API key from https://login.tailscale.com/admin/settings/keys
  # Grafana dashboard: https://grafana.com/grafana/dashboards/17298
  #
  # tailscale-exporter:
  #   image: ghcr.io/davidmuma/tailscale_exporter:latest
  #   container_name: tailscale-exporter
  #   restart: unless-stopped
  #   environment:
  #     - TAILSCALE_API_KEY=${TAILSCALE_API_KEY}
  #     - TAILSCALE_TAILNET=${TAILSCALE_TAILNET}   # e.g. user@github or your tailnet name
  #   ports:
  #     - "9100:9100"
  #   networks:
  #     - media-network

networks:
  media-network:
    external: true