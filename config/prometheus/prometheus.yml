global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
    honor_labels: true

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'speedtest-tracker'
    static_configs:
      - targets: ['host.docker.internal:8443']
    metrics_path: '/prometheus'
    scheme: 'http'

  - job_name: 'pihole'
    static_configs:
      - targets: ['pihole-exporter:9617']

  # Uncomment when tailscale-exporter is enabled in compose-mon.yml
  # - job_name: 'tailscale'
  #   static_configs:
  #     - targets: ['tailscale-exporter:9736']
