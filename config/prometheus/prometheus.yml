global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter - System metrics (CPU, RAM, Disk, Network)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "${HOSTNAME:-banana}"

  # cAdvisor - Docker container metrics
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          instance: "${HOSTNAME:-banana}"

  # Pi-hole metrics
  - job_name: "pihole"
    static_configs:
      - targets: ["pihole-exporter:9617"]
        labels:
          instance: "${HOSTNAME:-banana}"

  # Radarr metrics
  - job_name: "radarr"
    static_configs:
      - targets: ["exportarr-radarr:9707"]
        labels:
          instance: "${HOSTNAME:-banana}"

  # Sonarr metrics
  - job_name: "sonarr"
    static_configs:
      - targets: ["exportarr-sonarr:9708"]
        labels:
          instance: "${HOSTNAME:-banana}"

  # Prowlarr metrics
  - job_name: "prowlarr"
    static_configs:
      - targets: ["exportarr-prowlarr:9709"]
        labels:
          instance: "${HOSTNAME:-banana}"

  # SMART disk health metrics (RAID monitoring)
  - job_name: "smartctl"
    static_configs:
      - targets: ["smartctl-exporter:9633"]
        labels:
          instance: "${HOSTNAME:-banana}"

  # Add more exporters here as needed
